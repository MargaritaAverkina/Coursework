<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#162019"/>
      <stop offset="100%" stop-color="#080c0a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Фон -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Зовнішнє кільце -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="rgba(0,255,110,0.25)" stroke-width="1"/>

  <!-- Восьмикутник (знак STOP) — зовнішній контур/glow -->
  <polygon
    points="22,10 42,10 54,22 54,42 42,54 22,54 10,42 10,22"
    fill="none"
    stroke="rgba(0,255,110,0.2)"
    stroke-width="3"
    filter="url(#glow)"
  />

  <!-- Восьмикутник — основний неоновий контур -->
  <polygon
    points="22,10 42,10 54,22 54,42 42,54 22,54 10,42 10,22"
    fill="rgba(0,255,110,0.06)"
    stroke="#00ff6e"
    stroke-width="1.5"
    filter="url(#glow)"
  />

  <!-- Текст STOP -->
  <text
    x="32" y="37"
    text-anchor="middle"
    font-family="'Arial Black', sans-serif"
    font-size="14"
    font-weight="900"
    letter-spacing="0.5"
    fill="#00ff6e"
    filter="url(#glow)"
  >STOP</text>
</svg>
